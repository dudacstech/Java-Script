<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 3 Infomação de Saldo</title>
</head>

<body>
    <script>
        let saldo = 1000.00
        saldo *= 1.01

        document.write ("<br> Saldo reajustado: " + saldo.toFixed(2))


    </script>
</body>

</html>
